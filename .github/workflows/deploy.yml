name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight deploy at a time; cancel queued runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: prod/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        # If deploying to a project page (https://USER.github.io/REPO/),
        # Vite needs `base: "/REPO/"`. We pass it through env so you don't
        # have to hard-code the repo name in vite.config.js.
        env:
          VITE_BASE: /
        run: npm run build

      - name: Add SPA-safe 404 fallback
        # Pages serves /404.html for any unknown path. Copying index.html
        # there means deep links and refreshes still load the app.
        run: cp dist/index.html dist/404.html

      - name: Disable Jekyll
        # Tells Pages not to try to process the output as Jekyll. Without
        # this, files/folders starting with `_` (like Vite's chunks) are
        # silently dropped.
        run: touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: prod/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
